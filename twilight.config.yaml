# 站点配置
site:
    # 站点 URL（以斜杠结尾）
    siteURL: "https://auraduan.github.io/"
    # 站点标题
    title: "SD_1631的博客"
    # 站点副标题
    subtitle: "技术博客 | 低空飞行器 | PX4飞控"
    # 语言配置
    lang: "zh"
    # 翻译配置
    translate:
        enable: true
        service: "client.edge"
        showSelectTag: false
        autoDiscriminate: true
        ignoreClasses:
            - "ignore"
            - "banner-title"
            - "banner-subtitle"
        ignoreTags:
            - "script"
            - "style"
            - "code"
            - "pre"
    # 时区配置
    timeZone: 8
    # 字体配置
    font: {}
    # 主题色配置
    themeColor:
        hue: 200
    # 默认主题
    defaultTheme: "dark"
    # 壁纸配置
    wallpaper:
        mode: "banner"
        src:
            desktop:
                - "/assets/images/desktopWallpaper_1.jpg"
            mobile:
                - "/assets/images/mobileWallpaper_1.jpg"
        position: "center"
        carousel:
            enable: false
            interval: 3.6
            kenBurns: true
        banner:
            homeText:
                enable: true
                title: "SD_1631"
                subtitle:
                    - "低空飞行器开发"
                    - "PX4飞控学习"
                    - "技术笔记"
                typewriter:
                    enable: true
                    speed: 111
                    deleteSpeed: 51
                    pauseTime: 3000
            credit:
                enable: false
            navbar:
                transparentMode: "semifull"
            waves:
                enable: true
                performanceMode: false
        fullscreen:
            zIndex: -1
            opacity: 0.9
            blur: 1
            navbar:
                transparentMode: "semi"
    # 加载页配置
    loadingOverlay:
        enable: true
        waitForAllResources: true
        title:
            enable: true
            content: "LOADING"
            interval: 1.5
        spinner:
            enable: true
            interval: 1.5
    # favicon 配置
    favicon: []
    # bangumi 配置
    bangumi:
        userId: ""
    # OpenGraph 配置
    generateOgImages: false

# 统计配置
analytics:
    enabled: false
    platform: "umami"
    umami:
        baseUrl: ""
        apiKey: ''
        code: ''

# 导航栏配置
navbar:
    links:
        - "Home"
        - "Archive"
        - name: "Exhibition"
          url: "/exhibition/"
          icon: "material-symbols:person"
          description: "我的作品与经历"
          children:
              - "Projects"
              - "Skills"
              - "Timeline"
        - "Friends"
        - "About"

# 侧边栏配置
sidebar:
    components:
        left:
            - type: "profile"
              position: "top"
              visibility:
                  mode: "exclude"
                  paths: ["^/posts/", "^/archive"]
            - type: "directory"
              position: "sticky"
            - type: "categories"
              position: "sticky"
              responsive:
                  collapseThreshold: 5
              depth: 3
            - type: "tags"
              position: "sticky"
              responsive:
                  collapseThreshold: 20
        right:
            - type: "announcement"
              position: "top"
              visibility:
                  mode: "include"
                  paths: ["^/$"]
            - type: "toc"
              position: "sticky"
              depth: 3
            - type: "statistics"
              position: "sticky"
              visibility:
                  mode: "include"
                  paths: ["^/$", "^/archive$"]

# 资料配置
profile:
    avatar: "/assets/images/avatar.jpg"
    name: "auraduan"
    bio: "低空飞行器开发者 | PX4飞控爱好者"
    links:
        - name: "GitHub"
          icon: "fa6-brands:github"
          url: "https://github.com/auraduan"

# 公告配置
announcement:
    title: "公告"
    content: "欢迎来到我的技术博客！"
    closable: true
    link:
        enable: true
        text: "了解更多"
        url: "/about/"
        external: false

# 文章配置
post:
    showLastModified: true
    expressiveCode:
        theme: "github-dark"
    license:
        enable: true
        name: "CC BY-NC-SA 4.0"
        url: "https://creativecommons.org/licenses/by-nc-sa/4.0/"
    comment:
        enable: false
        twikoo:
            envId: ""
            lang: "zh"

# 页脚配置
footer:
    enable: false
    customHtml: ""

# 粒子特效配置
particle:
    enable: true
    particleNum: 12
    limitTimes: -1
    size:
        min: 0.3
        max: 0.9
    opacity:
        min: 0.3
        max: 0.9
    speed:
        horizontal:
            min: -0.9
            max: 0.9
        vertical:
            min: 0.15
            max: 0.3
        rotation: 0.12
        fadeSpeed: 0.12
    zIndex: 100

# 音乐播放器配置
musicPlayer:
    enable: false
    mode: "meting"
    meting:
        meting_api: "https://meting.spr-aachen.com/api"
        server: "netease"
        type: "playlist"
        id: ""
    local:
        playlist: []
    autoplay: false

# 看板娘配置
pio:
    enable: false
    models:
        - "/pio/models/pio/model.json"
    position: "left"
    width: 280
    height: 250
    mode: "draggable"
    hiddenOnMobile: true
    dialog:
        welcome: "欢迎！"
        touch:
            - "你在干什么？"
            - "不要摸我！"
        home: "点击返回首页"
        skin:
            - "想看看我的新装扮吗？"
        close: "下次再见~"
        link: ""
